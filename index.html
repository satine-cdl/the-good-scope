<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>THE SCOPE - Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Polices ultra-légères et techniques -->
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@100;200;300;400&family=JetBrains+Mono:wght@100;300;400&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: "#FCFCFC",
                        primary: "#111111",
                        line: "#EAEAEA",
                    },
                    fontFamily: {
                        "display": ["Jost", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: theme('colors.background'); 
            color: theme('colors.primary'); 
            overflow-x: hidden;
        }
        
        /* Cacher la barre de défilement pour un look parfait */
        ::-webkit-scrollbar { width: 0px; display: none; }
        
        /* L'effet "Zoom Loop" (Zoom infini très lent) */
        @keyframes slowZoom {
            0% { transform: scale(1.02); }
            100% { transform: scale(1.15); }
        }
        .zoom-loop {
            animation: slowZoom 20s infinite alternate ease-in-out;
        }
        
        /* Effet d'apparition en douceur */
        .fade-in {
            animation: fadeIn 1s ease-in forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="font-display selection:bg-primary selection:text-white">

    <!-- Menu de navigation (Fixe et minimaliste) -->
    <nav class="w-full flex justify-between items-center px-10 py-8 z-50 fixed top-0 bg-background/80 backdrop-blur-md">
        <div class="text-xl font-display font-light tracking-[0.3em] uppercase">
            THE SCOPE
        </div>

        <div class="hidden md:flex gap-12">
            <a href="#" class="text-[9px] font-mono tracking-[0.2em] uppercase opacity-40 hover:opacity-100 transition-opacity pb-1 border-b border-primary">The Index</a>
            <a href="#" class="text-[9px] font-mono tracking-[0.2em] uppercase opacity-40 hover:opacity-100 transition-opacity">Ecosystem</a>
            <a href="#" class="text-[9px] font-mono tracking-[0.2em] uppercase opacity-40 hover:opacity-100 transition-opacity">Traceability</a>
            <a href="#" class="text-[9px] font-mono tracking-[0.2em] uppercase opacity-40 hover:opacity-100 transition-opacity">Contribute</a>
        </div>
    </nav>

    <!-- HEADER: Titre et Recherche au début -->
    <header class="w-full min-h-[90vh] flex flex-col items-center justify-center px-6 fade-in">
        <h1 class="text-[15vw] md:text-[12vw] leading-none font-display font-thin tracking-widest uppercase text-center ml-4">
            THE SCOPE
        </h1>
        
        <!-- Barre de recherche -->
        <div class="w-full max-w-lg relative mt-16 group">
            <input id="searchInput" class="w-full bg-transparent border-0 border-b border-primary/20 focus:border-primary focus:ring-0 font-mono text-center text-[10px] md:text-[12px] tracking-[0.3em] px-0 py-4 outline-none placeholder:text-primary/30 uppercase transition-colors" placeholder="Type to search archive..." type="text"/>
            <span class="material-symbols-outlined absolute right-0 bottom-4 opacity-30 font-light transition-opacity group-focus-within:opacity-100">search</span>
        </div>
    </header>

    <!-- SECTION DES MARQUES: L'effet Stack (Cartes superposées) -->
    <!-- Le pb-screen assure qu'on peut scroller jusqu'à la toute dernière carte -->
    <main id="resultsContainer" class="w-full flex flex-col items-center pb-[50vh]">
        <!-- Les marques seront injectées ici par le JS -->
    </main>

    <script>
        let brandsData = [];

        async function loadDatabase() {
            try {
                // Le cacheBuster force ton navigateur à bien charger les 100 marques
                const cacheBuster = new Date().getTime();
                const response = await fetch(`brands.json?v=${cacheBuster}`);
                brandsData = await response.json();
                displayResults(brandsData);
            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById('resultsContainer').innerHTML = "<p class='text-red-500 font-mono tracking-widest uppercase mt-12'>System offline.</p>";
            }
        }

        function displayResults(brands) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = ''; 

            if (brands.length === 0) {
                container.innerHTML = "<p class='text-[12px] font-mono tracking-[0.2em] uppercase opacity-40 mt-32'>No match found in archive.</p>";
                return;
            }

            brands.forEach((brand, index) => {
                // Chaque carte est un block sticky qui va s'accrocher en haut de l'écran
                // Le mb-[80vh] crée un énorme espace vide pour forcer l'utilisateur à scroller 
                // et voir la carte suivante glisser par-dessus l'ancienne.
                
                const card = `
                    <div class="sticky top-[10vh] md:top-[12vh] w-full flex justify-center mb-[70vh] px-4">
                        
                        <a href="${brand.website}" target="_blank" rel="noopener noreferrer" class="relative w-full max-w-[28rem] md:max-w-[35rem] aspect-[4/5] bg-black overflow-hidden shadow-[0_30px_60px_rgba(0,0,0,0.15)] group cursor-crosshair">
                            
                            <!-- L'image avec l'effet Zoom Loop -->
                            <img src="${brand.image_url}" alt="${brand.name}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 zoom-loop transition-opacity duration-700" loading="lazy" />
                            
                            <!-- Overlay assombri (dégradé) pour que le texte soit toujours lisible -->
                            <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent flex flex-col justify-end p-8 md:p-12">
                                
                                <div class="flex justify-between items-end">
                                    <div>
                                        <h2 class="text-4xl md:text-5xl font-display font-light uppercase tracking-[0.1em] text-white group-hover:tracking-[0.15em] transition-all duration-500">${brand.name}</h2>
                                        <p class="text-[9px] md:text-[10px] font-mono tracking-[0.3em] uppercase text-white/60 mt-3">${brand.style}</p>
                                    </div>
                                </div>
                                
                                <!-- Ligne de séparation fine -->
                                <div class="w-full h-[1px] bg-white/20 mt-6 mb-4 group-hover:bg-white/40 transition-colors"></div>
                                
                                <div class="flex justify-between items-center w-full">
                                    <!-- Badges d'engagements -->
                                    <div class="flex flex-wrap gap-2">
                                        ${brand.commitments.slice(0, 2).map(c => `<span class="text-[7px] md:text-[8px] font-mono uppercase tracking-[0.1em] border border-white/30 text-white/80 px-2 py-1 backdrop-blur-sm">${c}</span>`).join('')}
                                    </div>
                                    <span class="text-[9px] font-mono uppercase tracking-[0.2em] text-white/50">${brand.location}</span>
                                </div>
                                
                            </div>
                        </a>
                        
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', card);
            });
        }

        // Système de recherche
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filteredBrands = brandsData.filter(brand => {
                return brand.name.toLowerCase().includes(query) || 
                       brand.style.toLowerCase().includes(query) ||
                       brand.location.toLowerCase().includes(query) ||
                       brand.commitments.join(" ").toLowerCase().includes(query);
            });
            displayResults(filteredBrands);
            
            // Si on tape quelque chose, on fait défiler doucement la page vers les résultats
            if (query.length > 0) {
                window.scrollTo({ top: window.innerHeight * 0.8, behavior: 'smooth' });
            }
        });

        loadDatabase();
    </script>
</body>
</html>
