<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>THE SCOPE - Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Typographie ultra-fine (Jost) et technique (JetBrains) -->
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@100;200;300;400&family=JetBrains+Mono:wght@100;300;400&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: "#FFFFFF", // Blanc pur comme sur tes refs
                        primary: "#111111",
                        line: "#F0F0F0", // Gris presque invisible
                    },
                    fontFamily: {
                        "display": ["Jost", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: theme('colors.background'); color: theme('colors.primary'); }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>

<body class="min-h-screen relative overflow-x-hidden font-display">

    <!-- Navigation minimaliste -->
    <nav class="w-full flex justify-between items-center px-12 py-8 z-50 fixed top-0 bg-background/90 backdrop-blur-md">
        <div class="text-xl font-display font-light tracking-[0.3em] uppercase">
            THE SCOPE
        </div>

        <div class="hidden md:flex gap-12">
            <a href="#" class="text-[9px] font-mono tracking-[0.2em] uppercase opacity-40 hover:opacity-100 transition-opacity pb-1 border-b border-primary">The Index</a>
            <a href="#" class="text-[9px] font-mono tracking-[0.2em] uppercase opacity-40 hover:opacity-100 transition-opacity">Ecosystem</a>
            <a href="#" class="text-[9px] font-mono tracking-[0.2em] uppercase opacity-40 hover:opacity-100 transition-opacity">Traceability</a>
            <a href="#" class="text-[9px] font-mono tracking-[0.2em] uppercase opacity-40 hover:opacity-100 transition-opacity">Contribute</a>
        </div>
    </nav>

    <!-- Header -->
    <main class="w-full flex flex-col items-center justify-center z-20 mt-40 px-6">
        <h1 class="text-[12vw] leading-none font-display font-thin tracking-widest uppercase text-center">
            THE SCOPE
        </h1>
        
        <!-- Barre de recherche invisible (juste du texte tapable) -->
        <div class="w-full max-w-xl relative mt-24 mb-16">
            <input id="searchInput" class="w-full bg-transparent border-0 border-b border-primary/20 focus:border-primary focus:ring-0 font-mono text-center text-[10px] tracking-[0.3em] px-0 py-4 outline-none placeholder:text-primary/30 uppercase transition-colors" placeholder="Type to search archive..." type="text"/>
        </div>
    </main>

    <!-- Liste Éditoriale (Table of Contents Style) -->
    <section id="resultsContainer" class="w-full max-w-6xl mx-auto flex flex-col pb-32">
        <!-- Les lignes générées par le JS apparaîtront ici -->
    </section>

    <script>
        let brandsData = [];

        async function loadDatabase() {
            try {
                // Le "?v=..." force le navigateur à vider son cache et à charger tes 100 marques
                const cacheBuster = new Date().getTime();
                const response = await fetch(`brands.json?v=${cacheBuster}`);
                brandsData = await response.json();
                displayResults(brandsData);
            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById('resultsContainer').innerHTML = "<p class='text-center text-red-500 font-mono text-[10px] uppercase tracking-widest mt-12'>System offline.</p>";
            }
        }

        function displayResults(brands) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = ''; 

            if (brands.length === 0) {
                container.innerHTML = "<p class='text-center text-[10px] font-mono tracking-widest uppercase opacity-40 mt-12'>No match found.</p>";
                return;
            }

            // Génération de la liste façon sommaire de magazine
            brands.forEach(brand => {
                const row = `
                    <a href="${brand.website}" target="_blank" rel="noopener noreferrer" class="group flex flex-col md:flex-row items-center justify-between w-full py-6 md:py-10 hover:bg-[#FAFAFA] transition-colors duration-500 cursor-crosshair">
                        
                        <!-- Gauche : Nom de la marque -->
                        <div class="w-full md:w-1/3 text-center md:text-left pl-0 md:pl-12 mb-6 md:mb-0">
                            <h2 class="text-2xl md:text-3xl font-display font-light uppercase tracking-[0.2em] group-hover:tracking-[0.25em] transition-all duration-500">${brand.name}</h2>
                        </div>
                        
                        <!-- Centre : Image (empilées verticalement) -->
                        <div class="w-full md:w-1/3 flex justify-center relative">
                            <div class="w-48 h-64 overflow-hidden relative">
                                <img src="${brand.image_url}" alt="${brand.name}" class="w-full h-full object-cover grayscale opacity-70 group-hover:opacity-100 group-hover:grayscale-0 transition-all duration-700 group-hover:scale-105" loading="lazy" />
                                
                                <!-- Les 3 petits textes (commitments) en haut à gauche de l'image -->
                                <div class="absolute top-2 left-2 flex flex-col gap-1 z-10 opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-100">
                                    ${brand.commitments.map(c => `<span class="text-[7px] font-mono uppercase tracking-[0.2em] bg-white/90 text-primary px-2 py-[2px] backdrop-blur-sm">${c}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                        
                        <!-- Droite : Style et Localisation -->
                        <div class="w-full md:w-1/3 text-center md:text-right pr-0 md:pr-12 mt-6 md:mt-0 flex flex-col items-center md:items-end gap-2">
                            <span class="text-[9px] font-mono uppercase tracking-[0.3em] opacity-80">${brand.style}</span>
                            <div class="w-4 h-[1px] bg-primary/20 my-1"></div>
                            <span class="text-[9px] font-mono uppercase tracking-[0.2em] opacity-40">${brand.location}</span>
                            <span class="text-[9px] font-mono uppercase tracking-[0.1em] opacity-30 mt-2">${brand.price}</span>
                        </div>
                        
                    </a>
                `;
                container.insertAdjacentHTML('beforeend', row);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filteredBrands = brandsData.filter(brand => {
                return brand.name.toLowerCase().includes(query) || 
                       brand.style.toLowerCase().includes(query) ||
                       brand.location.toLowerCase().includes(query) ||
                       brand.commitments.join(" ").toLowerCase().includes(query);
            });
            displayResults(filteredBrands);
        });

        loadDatabase();
    </script>
</body>
</html>
