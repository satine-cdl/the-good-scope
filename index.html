<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>THE SCOPE - Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: "#FAFAFA",
                        primary: "#111111",
                        accent: "#F9B9EE", // Le rose
                    },
                    fontFamily: {
                        "serif": ["Playfair Display", "serif"],
                        "sans": ["Space Grotesk", "sans-serif"],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: theme('colors.background'); color: theme('colors.primary'); }
        /* Grille à pois subtile */
        .dot-grid {
            background-image: radial-gradient(#111111 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.1;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }
        /* Design brutaliste pour les cartes */
        .magazine-card {
            border: 1px solid #111111;
            transition: all 0.3s ease;
        }
        .magazine-card:hover {
            background-color: #111111;
            color: #FAFAFA;
            transform: translateY(-5px);
            box-shadow: 8px 8px 0px 0px #F9B9EE;
        }
        .magazine-card:hover img { filter: grayscale(0%); }
    </style>
</head>

<body class="min-h-screen relative overflow-x-hidden font-sans">
    <div class="dot-grid"></div>

    <!-- Navigation Editoriale (Toujours visible) -->
    <nav class="w-full flex flex-col md:flex-row justify-between items-center px-8 py-6 z-50 fixed top-0 bg-background/90 backdrop-blur-md border-b border-primary">
        <div class="text-xl font-serif font-bold tracking-widest uppercase mb-4 md:mb-0">
            THE SCOPE
        </div>

        <!-- Les catégories -->
        <div class="flex flex-wrap justify-center gap-6 md:gap-10">
            <a href="#" class="text-xs tracking-[0.2em] uppercase hover:text-accent transition-colors font-medium border-b border-primary pb-1">The Index</a>
            <a href="#" class="text-xs tracking-[0.2em] uppercase hover:text-accent transition-colors font-medium">Ecosystem</a>
            <a href="#" class="text-xs tracking-[0.2em] uppercase hover:text-accent transition-colors font-medium">Traceability</a>
            <a href="#" class="text-xs tracking-[0.2em] uppercase hover:text-accent transition-colors font-medium">Contribute</a>
        </div>
    </nav>

    <!-- Header / Typographie Géante -->
    <main class="w-full flex flex-col items-center justify-center z-20 mt-48 px-6 mb-24">
        <h1 class="text-[15vw] leading-[0.8] font-serif tracking-tighter uppercase text-center flex flex-col items-center">
            <span class="font-bold">THE</span>
            <span class="italic text-accent">SCOPE</span>
        </h1>
        
        <p class="mt-12 text-sm uppercase tracking-[0.3em] font-medium text-center max-w-lg">
            Independent Fashion Directory.<br>Highlighting brands that respect the environment and human rights.
        </p>

        <!-- Barre de recherche -->
        <div class="w-full max-w-2xl relative group mt-16 border-2 border-primary bg-white">
            <input id="searchInput" class="w-full bg-transparent border-none focus:ring-0 font-sans text-center text-sm tracking-widest px-6 py-5 outline-none placeholder:text-primary/40 uppercase" placeholder="SEARCH (ex: denim, vegan, UK)..." type="text"/>
            <span class="material-symbols-outlined absolute right-4 bottom-5 opacity-50">search</span>
        </div>
    </main>

    <!-- Grille des résultats -->
    <!-- On utilise tag <a> directement dans le JS pour que toute la carte soit cliquable -->
    <section id="resultsContainer" class="w-full max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 px-6 z-20 pb-32">
        <!-- Cartes générées par le JS -->
    </section>

    <script>
        let brandsData = [];

        async function loadDatabase() {
            try {
                const response = await fetch('brands.json');
                brandsData = await response.json();
                displayResults(brandsData);
            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById('resultsContainer').innerHTML = "<p class='col-span-full text-center text-red-500 uppercase tracking-widest mt-12 border border-red-500 p-4'>Database offline.</p>";
            }
        }

        function displayResults(brands) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = ''; 

            if (brands.length === 0) {
                container.innerHTML = "<p class='col-span-full text-center text-2xl font-serif italic text-primary/50 mt-12'>No matching brand found in the archive.</p>";
                return;
            }

            brands.forEach(brand => {
                // Remarque : La balise <a> englobe tout, donc un clic n'importe où ouvre le site !
                const card = `
                    <a href="${brand.website}" target="_blank" rel="noopener noreferrer" class="magazine-card group flex flex-col bg-white cursor-pointer overflow-hidden relative">
                        <div class="relative w-full aspect-[4/5] border-b border-primary bg-gray-100 overflow-hidden">
                            <img src="${brand.image_url}" alt="${brand.name}" class="w-full h-full object-cover grayscale transition-all duration-500 group-hover:scale-105" />
                            
                            <div class="absolute top-4 left-4 flex flex-col gap-2 z-10">
                                ${brand.commitments.map(c => `<span class="text-[9px] uppercase tracking-widest bg-primary text-white px-2 py-1">${c}</span>`).join('')}
                            </div>
                        </div>
                        
                        <div class="p-6 flex flex-col flex-grow justify-between">
                            <div>
                                <div class="flex justify-between items-start mb-2">
                                    <h2 class="text-3xl font-serif uppercase tracking-tight font-bold group-hover:text-accent transition-colors">${brand.name}</h2>
                                    <span class="text-[10px] uppercase tracking-widest border border-current px-2 py-1">${brand.price}</span>
                                </div>
                                <p class="text-xs uppercase tracking-widest opacity-70">${brand.style}</p>
                            </div>
                            
                            <div class="mt-8 flex justify-between items-center pt-4 border-t border-current opacity-50 group-hover:opacity-100">
                                <span class="text-[10px] uppercase tracking-widest">${brand.location}</span>
                                <span class="material-symbols-outlined text-sm">arrow_outward</span>
                            </div>
                        </div>
                    </a>
                `;
                container.insertAdjacentHTML('beforeend', card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filteredBrands = brandsData.filter(brand => {
                return brand.name.toLowerCase().includes(query) || 
                       brand.style.toLowerCase().includes(query) ||
                       brand.location.toLowerCase().includes(query) ||
                       brand.commitments.join(" ").toLowerCase().includes(query);
            });
            displayResults(filteredBrands);
        });

        loadDatabase();
    </script>
</body>
</html>
